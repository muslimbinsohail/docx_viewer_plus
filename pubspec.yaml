name: docx_viewer_plus
description: A powerful Flutter package for viewing, editing, and sharing .docx (Microsoft Word) files natively. Supports rich text editing, customizable toolbar, RTL languages, and cross-platform save/share.
version: 1.0.0
homepage: https://github.com/muslimbinsohail/docx_viewer_plus
repository: https://github.com/muslimbinsohail/docx_viewer_plus
issue_tracker: https://github.com/muslimbinsohail/docx_viewer_plus/issues

topics:
  - docx
  - viewer
  - editor
  - word
  - document
  - rich-text

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  # File handling
  path_provider: ^2.1.5
  # DOCX parsing (ZIP + XML)
  archive: ^4.0.9
  xml: ^6.5.0
  # WebView for rendering + editing
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  # no plugin platform registration needed

