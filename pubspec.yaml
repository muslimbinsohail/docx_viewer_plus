name: docx_viewer_plus

description: >-
  A Flutter package for viewing and editing .docx files.
  Supports rich text editing, customizable toolbar, and cross-platform save.
version: 1.1.1

homepage: https://github.com/muslimbinsohail/docx_viewer_plus
repository: https://github.com/muslimbinsohail/docx_viewer_plus
issue_tracker: https://github.com/muslimbinsohail/docx_viewer_plus/issues

topics:
  - docx
  - viewer
  - editor
  - word
  - rich-text

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  # File handling
  path_provider: ^2.1.5
  # DOCX parsing (ZIP + XML)
  archive: ^4.0.9
  xml: ^6.6.1
  # WebView for rendering + editing
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  # no plugin platform registration needed

